<!DOCTYPE html>
<html>

<head>
    <title>Register Operation</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="container">

        <div class="nav">
            <div class="nav-brand">In Good Company</div>

            <div class="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/inventory">Vault</a>
                <a href="/market">Exchange</a>
                <a href="/player/{{ current_user.username }}">Profile</a>
                <a href="/logout">Logout</a>
            </div>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="flash">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="card">
            <h2>Register First Operation</h2>

            <p>
                Requirements: Level 3, 150 Trade Notes, and 25 basic resources.
            </p>

            <form method="POST">
                <label>Operation Name</label>
                <br>
                <input type="text" name="name" placeholder="Example: Greenbelt Farms" maxlength="80" required>

                <br><br>

                <label>Operation Type</label>
                <br>
                <select name="company_type" required>
                    <option value="">Choose a type</option>
                    <option value="Salvage">Salvage</option>
                    <option value="Farming">Farming</option>
                    <option value="Logistics">Logistics</option>
                    <option value="Trading">Trading</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Construction">Construction</option>
                </select>

                <br><br>

                <label>Description</label>
                <br>
                <textarea name="description" placeholder="What does your operation do?" maxlength="255"></textarea>

                <br><br>

                <button class="button" type="submit">
                    Register Operation
                </button>
            </form>
        </div>

    </div>

</body>

</html>
